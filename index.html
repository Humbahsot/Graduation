<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graduation RSVP Portal</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✉️</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght=0,500;0,600&family=DM+Sans:wght=400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --deep: #0B0F19;
    --deep2: #111827;
    --text: #F9FAFB;
    --text-muted: #9CA3AF;
    --accent: #EF4444;
    --success: #10B981;
    --border: rgba(255,255,255,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: var(--deep); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 600px; margin: 0 auto; }
  
  header { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 2.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1.5rem; text-align: center; }
  .title-area h1 { font-family: 'Playfair Display', serif; font-size: 1.85rem; color: var(--gold); }
  .title-area p { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; }
  
  button { padding: 12px 16px; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; border-radius: 4px; cursor: pointer; border: none; transition: background 0.2s ease; }
  .btn-primary { background: var(--gold); color: var(--deep); width: 100%; margin-top: 1rem; }
  .btn-primary:hover { background: #E8D5A3; }
  
  .panel { background: var(--deep2); border: 1px solid var(--border); border-radius: 6px; padding: 2rem; margin-bottom: 2rem; }
  .panel-title { font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); margin-bottom: 1.25rem; font-weight: 600; text-align: center; }
  
  .form-group { margin-bottom: 1.2rem; }
  .form-group label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 0.5rem; }
  .form-control { width: 100%; background: var(--deep); border: 1px solid var(--border); border-radius: 4px; padding: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; }
  .form-control:focus { outline: none; border-color: var(--gold); }
  .conditional-fields { display: none; border-left: 2px solid var(--gold); padding-left: 1rem; margin-top: 1rem; }
  
  .alert { padding: 12px; border-radius: 4px; font-size: 12px; margin-bottom: 1.5rem; display: none; text-align: center; }
  .alert-success { background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid var(--success); }
  .alert-error { background: rgba(239,68,68,0.15); color: var(--accent); border: 1px solid var(--accent); }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="title-area">
      <h1>Graduation Guest RSVP</h1>
      <p>Celebration Event · 12 June 2026</p>
    </div>
  </header>

  <div class="panel">
    <div class="panel-title">Submit Response</div>
    <div id="form-alert" class="alert"></div>
    
    <form id="rsvp-form" onsubmit="submitToEmail(event)">
      <!-- Web3Forms Routing Configuration -->
      <input type="hidden" name="access_key" id="web3forms-key" value="c0a447db-e1ca-4fb9-92fa-c86281670ee6">
      <input type="hidden" name="subject" value="New Graduation RSVP Submission">
      <input type="hidden" name="from_name" value="RSVP Portal Engine">

      <div class="form-group">
        <label for="f-name">Full Name</label>
        <input type="text" id="f-name" name="Guest Name" class="form-control" required placeholder="e.g. Bongani Khosa">
      </div>
      
      <div class="form-group">
        <label for="f-attending">Will you be attending?</label>
        <select id="f-attending" name="Attendance Status" class="form-control" required onchange="toggleCateringFields(this.value)">
          <option value="" disabled selected>Select an option</option>
          <option value="Yes, gladly">Yes, gladly</option>
          <option value="No, unfortunately">No, unfortunately</option>
        </select>
      </div>

      <!-- Secondary Catering Fields -->
      <div id="catering-fields" class="conditional-fields">
        <div class="form-group">
          <label for="f-chicken">Chicken Selection</label>
          <select id="f-chicken" name="Chicken Selection" class="form-control">
            <option value="Roasted Breast">Roasted Breast</option>
            <option value="Grilled Quarter">Grilled Quarter</option>
            <option value="Strips">Strips</option>
            <option value="N/A">Not Applicable</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="f-side">Preferred Side</label>
          <select id="f-side" name="Side Dish Choice" class="form-control">
            <option value="Savory Rice">Savory Rice</option>
            <option value="Potato Wedges">Potato Wedges</option>
            <option value="Salad Mix">Salad Mix</option>
            <option value="N/A">Not Applicable</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="f-drink">Drink Selection</label>
          <input type="text" id="f-drink" name="Drink Request" class="form-control" placeholder="e.g. Sparkling Water, Juice">
        </div>
      </div>

      <div class="form-group">
        <label for="f-dietary">Dietary Restrictions</label>
        <input type="text" id="f-dietary" name="Dietary Restrictions" class="form-control" placeholder="e.g. None, Vegetarian, Halal">
      </div>

      <button type="submit" id="submit-btn" class="btn-primary">Submit Registration</button>
    </form>
  </div>
</div>

<script>
  function toggleCateringFields(value) {
    const fields = document.getElementById('catering-fields');
    fields.style.display = (value === 'Yes, gladly') ? 'block' : 'none';
  }

  function showAlert(msg, isSuccess = true) {
    const alertBox = document.getElementById('form-alert');
    alertBox.textContent = msg;
    alertBox.className = `alert ${isSuccess ? 'alert-success' : 'alert-error'}`;
    alertBox.style.display = 'block';
  }

  async function submitToEmail(event) {
    event.preventDefault();
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = "Sending Email...";

    const formData = new FormData(event.target);
    const object = Object.fromEntries(formData);
    const json = JSON.stringify(object);

    try {
      const response = await fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Accept': 'application/json'
        },
        body: json
      });

      const resData = await response.json();

      if (response.status === 200 && resData.success) {
        showAlert("Thank you! Your RSVP has been sent directly to the host.");
        document.getElementById('rsvp-form').reset();
        toggleCateringFields('no');
      } else {
        showAlert(resData.message || "There was an issue sending your response.", false);
      }
    } catch (e) {
      showAlert("Network connection error. Could not reach mail server.", false);
    } finally {
      btn.disabled = false;
      btn.textContent = "Submit Registration";
    }
  }
</script>
</body>
</html>
